services:
  db:
    image: postgres:16-alpine
    container_name: kanban-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kanban
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: kanban-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/kanban
      SECRET_KEY: super-secret-key-change-in-production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: kanban-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
